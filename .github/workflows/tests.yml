name: tests

on: [push]

permissions:
  contents: read

jobs:
  main-package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        environment: [py311, py312, py313, py314]

    steps:
      - uses: actions/checkout@v4
      - name: Environment ${{ matrix.environment }} ${{ matrix.os }}
        uses: Serapieum-of-alex/github-actions/actions/python-setup/pixi@v1
        with:
          environments: ${{ matrix.environment }}
          activate-environment: ${{ matrix.environment }}

      - name: Run main tests
        run: |
          pixi run -e ${{ matrix.environment }} test-all

      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@v5

      - name: test Jupyter notebooks
        run: |
          pixi run -e ${{ matrix.environment }} notebooks
