name: Tests - Suite

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
  pull_request:

jobs:
  main-package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        environment: [py311, py312, py313]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: serapeum-org/github-actions/actions/python-setup/pixi@pixi/v1
        with:
          environments: ${{ matrix.environment }}
          activate-environment: ${{ matrix.environment }}
          cache: true

      - name: Run main tests (not plot, not xarray)
        run: pixi run -e ${{ matrix.environment }} main --cov-append --cov-fail-under=88

      - name: Run plot tests
        run: pixi run -e ${{ matrix.environment }} plot --cov-fail-under=92

      - name: Run xarray tests
        run: pixi run -e ${{ matrix.environment }} xarray-tests --cov-fail-under=92

      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@v5

      - name: test Jupyter notebooks
        run: pixi run -e ${{ matrix.environment }} notebooks

  extras-package:
    # One job per [project.optional-dependencies] group that ships native
    # deps (conda-forge backed). Each job installs the matching
    # ``dev-<extra>`` pixi env and runs only the tests tagged with the
    # extra's pytest marker. Tests auto-skip on missing deps via the
    # ``pytest_collection_modifyitems`` hook in tests/conftest.py, so
    # this job is the only place the extra-gated suite actually runs.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        target:
          # ``dir`` is the subdirectory that exercises the extra's code
          # paths. Keeping CI subdir-scoped avoids re-running the full
          # suite in every extras env while still covering the code
          # that each extra activates.
          - { name: netcdf_lazy,  env: netcdf-lazy,  dir: tests/netcdf/lazy }
          - { name: parquet_lazy, env: parquet-lazy, dir: tests/feature/lazy }
          - { name: stac,         env: stac,         dir: tests/dataset/test_stac.py }
          - { name: zonal,        env: zonal,        dir: tests/dataset/ops/test_zonal_stats.py }

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: serapeum-org/github-actions/actions/python-setup/pixi@pixi/v1
        with:
          environments: ${{ matrix.target.env }}
          activate-environment: ${{ matrix.target.env }}
          cache: true

      - name: Run ${{ matrix.target.name }} tests
        # ``--cov-fail-under=0`` overrides the 90% gate from
        # ``[tool.coverage.report]``; extras jobs are intentionally
        # narrow-scope and their coverage is aggregated with the main
        # job at Codecov.
        run: >-
          pixi run -e ${{ matrix.target.env }}
          pytest -vvv ${{ matrix.target.dir }}
          --cov=src/pyramids --cov-report=xml --cov-report=term-missing
          --cov-fail-under=0

      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@v5
