name: pypi-release

# SUPERSEDED (2026-04-13): build-wheels.yml is now the canonical publish
# entry point — it builds sdist + 9 platform wheels (Linux/macOS/Windows
# × cp311/312/313) and publishes all of them with the same PYPI_PUBLISH
# token this workflow used. See planning/bundle/task-6.3-pypi-trusted-publishing.md.
#
# This workflow is kept for emergency sdist-only releases (e.g., if the
# platform wheel build breaks and you need to ship just the sdist so
# conda-forge can continue to update). Trigger manually via
# `gh workflow run pypi-release.yml` when needed.

on:
  workflow_dispatch:
  # workflow_run trigger disabled; build-wheels.yml now handles releases.
  # workflow_run:
  #   workflows: ['github-release']
  #   types: [completed]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Build and publish sdist only (emergency fallback)
        uses: serapeum-org/github-actions/actions/release/pypi@pypi-release/v1
        with:
          pypi-username: __token__
          pypi-password: ${{ secrets.PYPI_PUBLISH }}
          package-manager: 'pixi'
          install-groups: 'dev'
          verify-lock: 'false'
