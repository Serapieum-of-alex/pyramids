name: docker-release

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["github-release"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Get latest release tag
        if: github.event_name == 'workflow_run'
        id: get-release
        run: |
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get repo image name (lowercase)
        shell: bash
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          echo "REPO_LC=${REPO_LC}" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${REPO_LC}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'workflow_run' }},value=${{ steps.get-release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'workflow_run' }},value=${{ steps.get-release.outputs.tag }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
